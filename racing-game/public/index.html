<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <meta name="description" content="Multiplayer Racing Webgame - Đua xe nhiều người chơi">
  <title>🏎️ Racing Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!-- LOBBY SCREEN -->
  <div id="lobby-screen" class="screen active">
    <div class="lobby-container">
      <h1 class="game-title">🏎️ RACING<br><span>ARENA</span></h1>
      <p class="subtitle">Multiplayer Racing Game</p>

      <div id="lobby-menu" class="lobby-section">
        <input type="text" id="player-name" placeholder="Nhập tên của bạn..." maxlength="12" class="input-field">
        <select id="vehicle-type" class="input-field">
          <option value="car">Ôtô</option>
          <option value="taxi">Taxi</option>
          <option value="bus">Xe buýt</option>
          <option value="police">Xe cảnh sát</option>
          <option value="trafficpolice">Xe công an giao thông</option>
          <option value="truck">Xe tải</option>
          <option value="sport">Xe thể thao</option>
          <option value="icecream">Xe kem</option>
          <option value="tank">Xe tăng</option>
          <option value="f1">Xe đua F1</option>
          <option value="bike">Xe máy</option>
        </select>
        <button id="btn-create" class="btn btn-primary">🏁 Tạo Phòng</button>
        <button id="btn-config" class="btn btn-outline">⚙️ Cấu hình</button>
        <div class="divider"><span>hoặc</span></div>
        <input type="text" id="room-code-input" placeholder="Nhập mã phòng..." maxlength="4" class="input-field"
          style="text-transform:uppercase">
        <button id="btn-join" class="btn btn-secondary">🚀 Tham Gia</button>
      </div>

      <div id="lobby-room" class="lobby-section hidden">
        <select id="room-vehicle-type" class="input-field">
          <option value="car">Ôtô</option>
          <option value="taxi">Taxi</option>
          <option value="bus">Xe buýt</option>
          <option value="police">Xe cảnh sát</option>
          <option value="trafficpolice">Xe công an giao thông</option>
          <option value="truck">Xe tải</option>
          <option value="sport">Xe thể thao</option>
          <option value="icecream">Xe kem</option>
          <option value="tank">Xe tăng</option>
          <option value="f1">Xe đua F1</option>
          <option value="bike">Xe máy</option>
        </select>
        <div class="room-code-display">
          <span>Mã phòng:</span>
          <strong id="room-code-label">----</strong>
        </div>
        <div id="room-qr-container" class="room-qr-container"></div>
        <div id="player-list" class="player-list"></div>
        <button id="btn-room-config" class="btn btn-outline btn-sm" style="margin-bottom: 0.5rem">⚙️ Cấu hình</button>
        <button id="btn-copy-link" class="btn btn-secondary btn-sm" style="margin-bottom: 1.5rem">🔗 Sao chép
          Link</button>
        <button id="btn-start" class="btn btn-primary hidden">▶️ Bắt Đầu</button>
        <button id="btn-close-room" class="btn btn-outline btn-sm hidden" style="margin-top: 0.5rem">🛑 Đóng phòng</button>
        <button id="btn-leave-room" class="btn btn-outline btn-sm hidden" style="margin-top: 0.5rem">↩️ Thoát phòng</button>
        <p id="waiting-msg" class="waiting-text">Đang chờ host bắt đầu...</p>
      </div>

      <div id="error-msg" class="error-msg hidden"></div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen hidden">
    <div id="phaser-container"></div>

    <!-- Countdown overlay -->
    <div id="countdown-overlay" class="overlay hidden">
      <div id="countdown-text" class="countdown-number">3</div>
    </div>

    <!-- Question overlay -->
    <div id="question-overlay" class="overlay hidden">
      <div class="question-box">
        <div class="question-timer-bar">
          <div id="question-timer-fill" class="timer-fill"></div>
        </div>
        <div id="question-timer-text" class="question-timer-text"></div>
        <div id="question-image-container" class="question-image-container"></div>
        <h2 id="question-text" class="question-title">Cau hoi?</h2>
        <div id="question-answers" class="answer-grid"></div>
      </div>
    </div>

    <!-- Question Result overlay -->
    <div id="result-overlay" class="overlay hidden">
      <div class="result-box">
        <div id="result-content"></div>
      </div>
    </div>

    <!-- Mobile controls -->
    <div id="mobile-controls" class="mobile-controls">
      <button id="btn-left" class="control-btn control-left">◀</button>
      <button id="btn-right" class="control-btn control-right">▶</button>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="results-screen" class="screen hidden">
    <div class="results-container">
      <h1 class="results-title">🏆 KẾT QUẢ</h1>
      <select id="results-vehicle-type" class="input-field" style="margin: 0.5rem 0 1rem;">
        <option value="car">Ôtô</option>
        <option value="taxi">Taxi</option>
        <option value="bus">Xe buýt</option>
        <option value="police">Xe cảnh sát</option>
        <option value="trafficpolice">Xe công an giao thông</option>
        <option value="truck">Xe tải</option>
        <option value="sport">Xe thể thao</option>
        <option value="icecream">Xe kem</option>
        <option value="tank">Xe tăng</option>
        <option value="f1">Xe đua F1</option>
        <option value="bike">Xe máy</option>
      </select>
      <div class="room-code-display" style="margin-top: 0.2rem;">
        <span>Mã phòng:</span>
        <strong id="results-room-code-label">----</strong>
      </div>
      <div id="results-room-qr-container" class="room-qr-container"></div>
      <button id="btn-results-copy-link" class="btn btn-secondary btn-sm" style="margin-bottom: 1rem">🔗 Sao chép
        Link</button>
      <div id="results-player-list" class="player-list"></div>
      <div id="rankings-list" class="rankings-list"></div>
      <button id="btn-play-again" class="btn btn-primary">🔄 Chơi Lại</button>
    </div>
  </div>

  <!-- CONFIG OVERLAY -->
  <div id="config-overlay" class="overlay hidden">
    <div class="result-box" style="max-width: 760px; width: 94%;">
      <h2 style="font-family: 'Outfit', sans-serif; margin-bottom: 0.75rem;">Cấu Hình Runtime</h2>
      <p style="color: var(--text-muted); margin-bottom: 0.75rem; font-size: 0.9rem;">
        Mỗi trường có mô tả ngay bên dưới. Lưu sẽ cập nhật cache runtime trên server.
      </p>
      <div id="config-form" class="config-form">
        <div class="config-form-loading">Đang tải cấu hình...</div>
      </div>
      <div style="display: flex; gap: 8px;">
        <button id="btn-config-close" class="btn btn-secondary">Đóng</button>
        <button id="btn-config-save" class="btn btn-primary">Lưu Cấu Hình</button>
      </div>
      <div id="config-msg" class="error-msg hidden" style="margin-top: 0.5rem;"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/vendor/phaser/phaser.min.js"></script>
  <script src="js/network.js"></script>
  <script src="js/input.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/phaserGame.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
